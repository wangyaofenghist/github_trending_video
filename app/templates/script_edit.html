{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <a href="/review" class="text-blue-600 hover:underline text-sm mb-4 inline-block">← 返回审核列表</a>

    <h2 class="text-2xl font-bold text-gray-900 mb-6">编辑文案</h2>

    <div class="bg-white rounded-lg shadow p-6">
        <form id="script-form" onsubmit="saveScript(event)">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">标题</label>
                <input type="text" id="script_title" value="{{ script.script_title }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">开场钩子</label>
                <input type="text" id="hook_opening" value="{{ script.hook_opening }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">正文内容</label>
                <textarea id="script_content" rows="10"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">{{ script.script_content }}</textarea>
                <p class="text-sm text-gray-500 mt-1">当前字数：<span id="word_count">{{ script.word_count }}</span></p>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">结尾引导</label>
                <textarea id="call_to_action" rows="3"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">{{ script.call_to_action }}</textarea>
            </div>

            <div class="flex justify-end space-x-3">
                <a href="/review" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">取消</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium">保存修改</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const scriptId = {{ script.id }};

    // 实时更新字数
    document.getElementById('script_content').addEventListener('input', function() {
        document.getElementById('word_count').textContent = this.value.length;
    });

    async function saveScript(event) {
        event.preventDefault();

        const data = {
            script_title: document.getElementById('script_title').value,
            hook_opening: document.getElementById('hook_opening').value,
            script_content: document.getElementById('script_content').value,
            call_to_action: document.getElementById('call_to_action').value
        };

        try {
            showToast('正在保存...', 'info');
            await apiRequest(`/api/script/${scriptId}`, 'PUT', data);
            showToast('保存成功', 'success');
            setTimeout(() => window.location.href = '/review', 1000);
        } catch (error) {
            showToast(`保存失败：${error.message}`, 'error');
        }
    }
</script>
{% endblock %}
