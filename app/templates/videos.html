{% extends "base.html" %}

{% block content %}
<div class="mb-8">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">视频库</h2>
    <p class="text-gray-600">视频生成过程管理与结果查看</p>
</div>

<!-- 状态统计卡片 -->
<div class="grid grid-cols-4 gap-4 mb-6">
    <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">全部任务</div>
        <div class="text-2xl font-bold" id="count-all">0</div>
    </div>
    <div class="bg-blue-50 rounded-lg shadow p-4">
        <div class="text-sm text-blue-500">生成中</div>
        <div class="text-2xl font-bold text-blue-600" id="count-generating">0</div>
    </div>
    <div class="bg-green-50 rounded-lg shadow p-4">
        <div class="text-sm text-green-500">已完成</div>
        <div class="text-2xl font-bold text-green-600" id="count-completed">0</div>
    </div>
    <div class="bg-red-50 rounded-lg shadow p-4">
        <div class="text-sm text-red-500">失败</div>
        <div class="text-2xl font-bold text-red-600" id="count-failed">0</div>
    </div>
</div>

<!-- 状态筛选 -->
<div class="flex items-center space-x-4 mb-4">
    <button class="status-filter px-4 py-2 rounded-md text-sm font-medium bg-blue-600 text-white" data-status="all">全部</button>
    <button class="status-filter px-4 py-2 rounded-md text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200" data-status="generating">生成中</button>
    <button class="status-filter px-4 py-2 rounded-md text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200" data-status="completed">已完成</button>
    <button class="status-filter px-4 py-2 rounded-md text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200" data-status="failed">失败</button>
    <button onclick="loadVideoList()" class="ml-auto px-4 py-2 text-sm text-blue-600 hover:bg-blue-50 rounded-md">刷新</button>
</div>

<!-- 视频列表 -->
<div class="bg-white rounded-lg shadow overflow-hidden">
    <div id="video-list-container" class="divide-y divide-gray-200">
        <!-- 视频列表将通过 JavaScript 动态加载 -->
        <div class="p-6 text-center text-gray-500">加载中...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentFilter = 'all';

// 状态对应的中文显示
const statusText = {
    'pending': '待审核',
    'approved': '已通过',
    'generating': '生成中',
    'completed': '已完成',
    'failed': '失败',
    'rejected': '已跳过'
};

// 状态对应的样式
const statusStyles = {
    'pending': 'bg-yellow-100 text-yellow-800',
    'approved': 'bg-blue-100 text-blue-800',
    'generating': 'bg-blue-100 text-blue-800',
    'completed': 'bg-green-100 text-green-800',
    'failed': 'bg-red-100 text-red-800',
    'rejected': 'bg-gray-100 text-gray-800'
};

// 状态筛选按钮点击事件
document.querySelectorAll('.status-filter').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.status-filter').forEach(b => {
            b.classList.remove('bg-blue-600', 'text-white');
            b.classList.add('bg-gray-100', 'text-gray-700');
        });
        this.classList.remove('bg-gray-100', 'text-gray-700');
        this.classList.add('bg-blue-600', 'text-white');
        currentFilter = this.dataset.status;
        loadVideoList();
    });
});

// 加载视频列表
async function loadVideoList() {
    const container = document.getElementById('video-list-container');
    container.innerHTML = '<div class="p-6 text-center text-gray-500">加载中...</div>';

    try {
        const response = await fetch(`/api/video/list?status=${currentFilter}&page=1&page_size=50`);
        const data = await response.json();

        if (data.success) {
            // 更新状态统计
            const counts = data.data.status_counts;
            document.getElementById('count-all').textContent = counts.all || 0;
            document.getElementById('count-generating').textContent = counts.generating || 0;
            document.getElementById('count-completed').textContent = counts.completed || 0;
            document.getElementById('count-failed').textContent = counts.failed || 0;

            const items = data.data.items;

            if (items.length === 0) {
                container.innerHTML = '<div class="p-6 text-center text-gray-500">暂无视频任务</div>';
                return;
            }

            let html = '';
            for (const item of items) {
                html += renderVideoItem(item);
            }
            container.innerHTML = html;
        } else {
            container.innerHTML = `<div class="p-6 text-center text-red-500">加载失败：${data.message}</div>`;
        }
    } catch (error) {
        console.error('加载视频列表失败:', error);
        container.innerHTML = '<div class="p-6 text-center text-red-500">加载失败，请刷新页面重试</div>';
    }
}

// 渲染单个视频项
function renderVideoItem(item) {
    const status = item.status;
    const progress = item.progress || 0;
    const statusClass = statusStyles[status] || 'bg-gray-100 text-gray-800';
    const statusLabel = statusText[status] || status;

    let progressHtml = '';
    if (status === 'generating' || status === 'approved') {
        progressHtml = `
            <div class="mt-2">
                <div class="flex justify-between text-xs text-gray-500 mb-1">
                    <span>生成进度</span>
                    <span>${progress}%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: ${progress}%"></div>
                </div>
            </div>
        `;
    }

    let actionHtml = '';
    if (status === 'completed' && item.video_url) {
        actionHtml = `
            <div class="flex items-center space-x-2">
                <a href="${item.video_url}" target="_blank" class="text-blue-600 hover:underline text-sm">查看视频</a>
                <button onclick="deleteVideo(${item.id})" class="text-red-600 hover:text-red-700 text-sm">移除</button>
            </div>
        `;
    } else if (status === 'failed' && item.error_message) {
        actionHtml = `
            <div class="flex items-center space-x-2">
                <span class="text-red-600 text-sm" title="${item.error_message}">查看错误</span>
                <button onclick="deleteVideo(${item.id})" class="text-red-600 hover:text-red-700 text-sm">移除</button>
            </div>
        `;
    } else if (status === 'generating' || status === 'approved') {
        actionHtml = `
            <div class="flex items-center space-x-2">
                <span class="text-blue-600 text-sm">生成中...</span>
                <button onclick="deleteVideo(${item.id})" class="text-red-600 hover:text-red-700 text-sm">移除</button>
            </div>
        `;
    }

    return `
        <div class="p-4 hover:bg-gray-50">
            <div class="flex items-center justify-between">
                <div class="flex-1">
                    <h3 class="font-medium text-gray-900">${escapeHtml(item.project_name)}</h3>
                    <p class="text-sm text-gray-500 mt-1">
                        创建时间：${formatDate(item.created_at)}
                        ${status === 'completed' && item.completed_at ? ' | 完成时间：' + formatDate(item.completed_at) : ''}
                    </p>
                    ${progressHtml}
                </div>
                <div class="flex items-center space-x-4 ml-4">
                    <span class="px-2 py-1 rounded text-xs font-medium ${statusClass}">${statusLabel}</span>
                    ${actionHtml}
                </div>
            </div>
        </div>
    `;
}

// 格式化日期
function formatDate(isoString) {
    if (!isoString) return 'N/A';
    const date = new Date(isoString);
    return date.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
    });
}

// HTML 转义
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 删除视频
async function deleteVideo(taskId) {
    if (!confirm('确定要删除这个视频任务吗？这将同时删除视频文件。')) return;

    try {
        const response = await fetch(`/api/video/${taskId}`, {
            method: 'DELETE'
        });
        const result = await response.json();

        if (result.success) {
            showToast('已删除', 'success');
            loadVideoList();
        } else {
            showToast(`删除失败：${result.message}`, 'error');
        }
    } catch (error) {
        showToast(`删除失败：${error.message}`, 'error');
    }
}

// 页面加载时获取视频列表
loadVideoList();

// 如果当前是生成中状态，定时刷新
setInterval(() => {
    if (currentFilter === 'generating') {
        loadVideoList();
    }
}, 5000);
</script>
{% endblock %}
